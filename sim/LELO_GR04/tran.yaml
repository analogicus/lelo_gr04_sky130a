#<name>:
#  src:
#    - <paramters>
#  typ: <typical spec value>
#  name: <long name>
#  min: <minimum spec value>
#  max: <maximum spec value>
#  scale: <scale, multiply result by scale>
#  digits: <significant digits>
#  unit: Unit

idd:
  src:
    - idd_-45
    - idd_25
    - idd_125
  name: Active current
  typ: 40
  min: 10
  max: 70
  scale: -1e6
  digits: 3
  unit: uA

iddq:
  src:
    - iddq_-45
    - iddq_25
    - iddq_125
  name: Leakage current
  typ: 50
  min: 0.0001
  max: 100
  scale: -1e9
  digits: 3
  unit: nA

fosc_-45:
  src:
    - fosc_-45
  name: Oscillation frequency @ -45C
  typ: 1.875
  min: -25%
  max: 25%
  scale: 1e-6
  digits: 3
  unit: MHz

fosc_25:
  src:
    - fosc_25
  name: Oscillation frequency @ 25C
  typ: 2.775
  min: -25%
  max: 25%
  scale: 1e-6
  digits: 3
  unit: MHz

fosc_125:
  src:
    - fosc_125
  name: Oscillation frequency @ 125C
  typ: 4.797
  min: -25%
  max: 25%
  scale: 1e-6
  digits: 3
  unit: MHz

t_err:
  src:
    - t_err_max
    - t_err_min
  name: Temperature error (calibrated @ 25C)
  typ: 0
  min: -10
  max: 10
  scale: 1
  digits: 2
  unit: C

t_err_com:
  src:
    - t_err_com_max
    - t_err_com_min
  name: Temperature error 0-70C (calibrated @ 25C)
  typ: 0
  min: -10
  max: 10
  scale: 1
  digits: 2
  unit: C
